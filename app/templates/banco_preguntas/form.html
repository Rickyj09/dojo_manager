{% extends "base_admin.html" %}
{% block title %}Pregunta{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">{% if item %}Editar pregunta{% else %}Nueva pregunta{% endif %}</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('banco_preguntas.list') }}">Volver</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Disciplina</label>
          <input class="form-control" name="disciplina" value="{{ item.disciplina if item else '' }}" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">Grado</label>
          <select class="form-select" name="grado_id" required>
            <option value="">-- Selecciona --</option>
            {% for g in grados %}
              <option value="{{ g.id }}" {% if item and item.grado_id==g.id %}selected{% endif %}>{{ g.nombre }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Tipo</label>
          <select class="form-select" name="tipo" required>
            <option value="OPCION_MULTIPLE" {% if item and item.tipo=='OPCION_MULTIPLE' %}selected{% endif %}>OPCION_MULTIPLE</option>
            <option value="VERDADERO_FALSO" {% if item and item.tipo=='VERDADERO_FALSO' %}selected{% endif %}>VERDADERO_FALSO</option>
            <option value="ABIERTA" {% if item and item.tipo=='ABIERTA' %}selected{% endif %}>ABIERTA</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Puntaje máximo</label>
          <input type="number" step="0.01" class="form-control" name="puntaje_max" value="{{ item.puntaje_max if item else '1.00' }}">
        </div>

        <div class="col-md-2">
          <label class="form-label">Dificultad</label>
          <input type="number" class="form-control" name="dificultad" value="{{ item.dificultad if item else '' }}">
        </div>

        <div class="col-md-8">
          <label class="form-label">Tags</label>
          <input class="form-control" name="tags" value="{{ item.tags if item else '' }}">
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="activo" value="1"
                   {% if (item and item.activo) or not item %}checked{% endif %}>
            <label class="form-check-label">Activo</label>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">Enunciado</label>
          <textarea class="form-control" name="enunciado" rows="4" required>{{ item.enunciado if item else '' }}</textarea>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success" type="submit">Guardar</button>

        {% if item %}
          <a class="btn btn-outline-dark" href="{{ url_for('banco_preguntas.opciones', pregunta_id=item.id) }}">
            Opciones
          </a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
