<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kiosko | Asistencia</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk_asistencia.css') }}?v=20260429">
</head>

<body class="kiosk">
  <div class="wrap">

    <div class="kiosk-title">
      <div>
        <h1 class="kiosk-heading">Kiosko de Asistencia</h1>
        <p class="kiosk-subtitle">Pantalla optimizada para tablet</p>
      </div>
      <div>
        <a class="btn btn-outline" href="/">Salir</a>
      </div>
    </div>

    <main class="panel">
      <section class="panel-body">

        <div class="filters-grid">
          <div class="field">
            <label for="fecha">Fecha</label>
            <input id="fecha" type="date" value="{{ fecha.isoformat() }}">
          </div>

          <div class="field">
            <label for="sucursal">Sucursal</label>
            <select id="sucursal">
              {% if not sucursales %}
                <option value="">-- Sin sucursales disponibles --</option>
              {% endif %}
              {% for s in sucursales %}
                <option value="{{ s.id }}" {% if s.id == sucursal_id %}selected{% endif %}>
                  {{ s.nombre }}
                </option>
              {% endfor %}
            </select>
            <p class="field-hint">Se guarda por fecha, alumno y sucursal.</p>
          </div>

          <div class="field">
            <label for="q">Buscar alumno</label>
            <input
              id="q"
              type="text"
              placeholder="Nombre o cédula..."
              autocomplete="off"
              inputmode="search"
              enterkeyhint="search"
            >
            <p class="field-hint">Mínimo 2 caracteres.</p>
          </div>
        </div>

        <div class="divider"></div>

        <div class="content-grid">
          <section class="results-panel">
            <h2 class="section-title">Resultados</h2>
            <div id="resultsWarning" class="alert alert-warning hidden"></div>
            <div id="results" class="results-list">
              <div class="results-placeholder">Escribe para buscar...</div>
            </div>
          </section>

          <aside class="selection-panel">
            <div class="selection-card">
              <div class="selection-label">Seleccionado</div>
              <div id="seleccion" class="selection-value">—</div>

              <div class="field">
                <div class="field-label">Estado</div>
                <div class="state-grid" role="group" aria-label="Estado de asistencia">
                  <button type="button" class="btn btn-success state-btn" data-estado="P">P (Presente)</button>
                  <button type="button" class="btn btn-danger state-btn" data-estado="A">A (Ausente)</button>
                  <button type="button" class="btn btn-warning state-btn" data-estado="T">T (Tarde)</button>
                  <button type="button" class="btn btn-info state-btn" data-estado="J">J (Justificado)</button>
                </div>
              </div>

              <div class="field">
                <label for="obs">Observación</label>
                <input id="obs" type="text" placeholder="Opcional">
              </div>

              <button id="btnMarcar" class="btn btn-primary btn-large" disabled>Guardar asistencia</button>
              <button id="btnLimpiar" class="btn btn-outline btn-large" type="button">Limpiar</button>

              <div id="feedback" class="alert hidden"></div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <p class="footer-note">Recomendación: usar un usuario exclusivo de Recepción/Kiosko.</p>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

  <script src="{{ url_for('static', filename='js/kiosk_asistencia.js') }}?v=20260429" defer></script>
</body>
</html>
