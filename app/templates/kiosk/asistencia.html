<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kiosko | Asistencia</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f6f7fb; }
    .wrap { max-width: 1200px; margin: 18px auto; padding: 0 14px; }
    .mono { font-family: ui-monospace, monospace; }
    .kiosk-title { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .select-hint { font-size: .9rem; color: #6c757d; }

    /* =========================
       TABLET TOUCH OPTIMIZATION
       ========================= */

    body.kiosk {
      -webkit-tap-highlight-color: transparent;
    }

    body.kiosk .form-control,
    body.kiosk .form-select {
      min-height: 56px;
      font-size: 1.1rem;
    }

    body.kiosk .results-list {
      max-height: 58vh;
      overflow: auto;
      scroll-behavior: smooth;
    }

    body.kiosk .results-list .list-group-item {
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    body.kiosk .results-list .list-group-item:active {
      transform: scale(0.98);
    }

    body.kiosk #seleccion {
      font-size: 1.5rem !important;
    }

    body.kiosk .kiosk-states .btn {
      min-height: 75px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    body.kiosk .big-btn {
      min-height: 70px;
      font-size: 1.25rem;
      border-radius: 14px;
    }

    body.kiosk .toast {
      border-radius: 14px;
    }

    body.kiosk .toast-body {
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      body.kiosk .results-list {
        max-height: 50vh;
      }
    }
  </style>

  <meta name="csrf-token" content="{{ csrf_token() if csrf_token is defined else '' }}">
</head>

<body class="kiosk">
  <div class="wrap">

    <div class="kiosk-title mb-3">
      <div>
        <h2 class="mb-0">🟦 Kiosko de Asistencia</h2>
        <div class="text-muted">Pantalla optimizada para tablet</div>
      </div>
      <div>
        <a class="btn btn-outline-secondary" href="/">Salir</a>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Fecha</label>
            <input id="fecha" type="date" class="form-control" value="{{ fecha.isoformat() }}">
          </div>

          <div class="col-md-4">
            <label class="form-label">Sucursal</label>
            <select id="sucursal" class="form-select">
              {% for s in sucursales %}
                <option value="{{ s.id }}" {% if s.id == sucursal_id %}selected{% endif %}>
                  {{ s.nombre }}
                </option>
              {% endfor %}
            </select>
            <div class="select-hint">Se guarda por (fecha, alumno, sucursal)</div>
          </div>

          <div class="col-md-5">
            <label class="form-label">Buscar alumno</label>
            <input
              id="q"
              type="text"
              class="form-control"
              placeholder="Nombre o cédula…"
              autocomplete="off"
              inputmode="search"
              enterkeyhint="search"
            >
            <div class="form-text">Mínimo 2 caracteres</div>
          </div>
        </div>

        <hr class="my-4">

        <div class="row g-4">
          <div class="col-lg-7">

            <div class="fw-semibold mb-2">Resultados</div>

            <div id="results" class="list-group results-list">
              <div class="text-muted p-3">Escribe para buscar…</div>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="card border-0 bg-light">
              <div class="card-body">

                <div class="text-muted small">Seleccionado</div>
                <div id="seleccion" class="fw-semibold mb-3">—</div>

                <div class="mb-3">
                  <div class="text-muted small mb-2">Estado</div>
                  <div class="btn-group w-100 kiosk-states" role="group">
                    <button type="button" class="btn btn-success" data-estado="P">P (Presente)</button>
                    <button type="button" class="btn btn-danger" data-estado="A">A (Ausente)</button>
                    <button type="button" class="btn btn-warning" data-estado="T">T (Tarde</button>
                    <button type="button" class="btn btn-info" data-estado="J">J (Justif.)</button>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Observación</label>
                  <input id="obs" type="text" class="form-control" placeholder="Opcional">
                </div>

                <button id="btnMarcar" class="btn btn-success big-btn w-100" disabled>
                  ✅ Guardar asistencia
                </button>

                <button id="btnLimpiar" class="btn btn-outline-secondary w-100 mt-2">
                  Limpiar
                </button>

              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="text-muted small mt-3">
      Recomendación: usar usuario exclusivo “Recepción/Kiosko”.
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1080;">

    <!-- Confirmación -->
    <div id="toastOk" class="toast" role="alert">
      <div class="toast-header">
        <strong class="me-auto">Asistencia</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastOkBody">Listo</div>
    </div>

    <!-- Aviso pensión -->
    <div id="toastAviso" class="toast mt-2" role="alert">
      <div class="toast-header">
        <strong class="me-auto" id="toastAvisoTitle">Aviso de pensión</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastAvisoBody"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/kiosk_asistencia.js') }}"></script>
</body>
</html>
